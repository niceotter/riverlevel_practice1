# .github/workflows/collect.yml
# 10분마다 수위 데이터 수집

name: Collect Water Level Data

on:
  schedule:
    - cron: '*/10 * * * *'  # 10분마다
  workflow_dispatch:         # 수동 실행 버튼

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Call collect API
        run: |
          curl -f -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://www.riverlevel-info.kr/api/cron/collect
