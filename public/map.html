<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://map.vworld.kr/js/vworldMapInit.js.do?version=2.0&apiKey=DA227030-273E-37F4-A3DD-73D741FD3A5B&domain=riverlevel-info.kr"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #vmap { width: 100%; height: 100%; }


    /* ── 지도 종류 버튼 ── */
    #map-type-btns {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      flex-direction: column;
      z-index: 100;
      border: 1px solid #bbb;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    #map-type-btns button {
      width: 48px;
      height: 36px;
      background: #fff;
      border: none;
      border-bottom: 1px solid #ddd;
      font-size: 11px;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      color: #333;
      cursor: pointer;
      transition: background 0.15s;
    }

    #map-type-btns button:last-child {
      border-bottom: none;
    }

    #map-type-btns button:hover {
      background: #f0f0f0;
    }

    #map-type-btns button.active {
      background: #1a6fc4;
      color: #fff;
      font-weight: 600;
    }


  </style>
</head>
<body>

    <div id="vmap" style="position: relative;">
    <div id="map-type-btns">
      <button onclick="setMode('GRAPHIC')" class="active">일반</button>
      <button onclick="setMode('GRAPHIC_WHITE')">백지도</button>
      <button onclick="setMode('GRAPHIC_NIGHT')">야간</button>
      <button onclick="setMode('PHOTO')">항공</button>
      <button onclick="setMode('PHOTO_HYBRID')">혼합</button>
    </div>
  </div>
  
  <script src="/js/vworld-map.js"></script>
</body>
</html>
